name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: ruff + mypy + pytest
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,web,data]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy type check
        run: mypy .

      # 章節合規：模板區塊、區塊順序、相對連結，以及所有 ```python 區塊的語法
      - name: Chapter compliance check
        run: python scripts/check_chapters.py

      # 導覽與計數：下一章/下一 Part 連結正確、Part README 章節齊全、章數一致
      - name: Nav & count check
        run: python scripts/gen_nav.py

      # exercises/ 為練習用，預設紅燈，故不納入 CI 的通過條件
      - name: Pytest (project / examples / solutions)
        run: pytest project examples solutions
